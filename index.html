<div id="avatarmanip-container" class="extension_container">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;">
            <b>AvatarManip Settings</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down interactable down" tabindex="0"></div>
        </div>
        <div class="inline-drawer-content" style="display:none;padding:10px 5px;">
            <div class="flex-container m-b-1">
                <label class="checkbox_label">
                    <input type="checkbox" id="am_enabled" checked>
                    Enable Manipulation
                </label>
            </div>
            <div class="flex-container m-b-1" style="flex-direction:column;gap:5px;">
                <label>Zoom Speed</label>
                <input type="number" id="am_zoomSpeed" class="text_pole" min="0.05" max="0.5" step="0.05" value="0.1">
            </div>
            <div class="flex-container m-b-1">
                <label class="checkbox_label">
                    <input type="checkbox" id="am_enableRotation" checked>
                    Enable Rotation
                </label>
            </div>
            <div class="flex-container m-b-1" style="flex-direction:column;gap:5px;">
                <label style="display:flex;justify-content:space-between;">
                    <span>Rotation Threshold</span>
                    <span id="am_rotationThresholdValue">0.7</span>
                </label>
                <input type="range" id="am_rotationThreshold" min="0.5" max="0.95" step="0.05" value="0.7">
            </div>
        </div>
    </div>
</div>

<div id="avatarmanip-mobile-controls" class="mobile-controls-drawer" style="display:none;">
    <div class="mobile-controls-toggle" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--secondary-color);border-radius:8px;margin-bottom:10px;">
        <b style="font-size:var(--main-text-size);color:var(--text-color);">
            <i class="fa-solid fa-mobile-screen-button"></i> Mobile Controls
        </b>
        <div class="mobile-controls-icon fa-solid fa-chevron-up interactable" tabindex="0" style="font-size:1.2rem;transition:transform 0.3s ease;"></div>
    </div>
    <div class="mobile-controls-content" style="padding:10px;background:var(--secondary-color);border-radius:8px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">
        <button id="am-zoom-in-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:var(--accent-color);color:white;font-size:18px;cursor:pointer;touch-action:manipulation;">
            <i class="fa-solid fa-magnifying-glass-plus"></i> Zoom In
        </button>
        <button id="am-zoom-out-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:var(--accent-color);color:white;font-size:18px;cursor:pointer;touch-action:manipulation;">
            <i class="fa-solid fa-magnifying-glass-minus"></i> Zoom Out
        </button>
        <button id="am-rotate-left-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:var(--accent-color);color:white;font-size:18px;cursor:pointer;touch-action:manipulation;">
            <i class="fa-solid fa-rotate-left"></i> Rotate Left
        </button>
        <button id="am-rotate-right-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:var(--accent-color);color:white;font-size:18px;cursor:pointer;touch-action:manipulation;">
            <i class="fa-solid fa-rotate-right"></i> Rotate Right
        </button>
        <button id="am-reset-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:#ff6b6b;color:white;font-size:18px;cursor:pointer;touch-action:manipulation;grid-column:span 2;">
            <i class="fa-solid fa-undo"></i> Reset Avatar
        </button>
        <button id="am-move-up-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:var(--accent-color);color:white;font-size:18px;cursor:pointer;touch-action:manipulation;grid-column:span 2;">
            <i class="fa-solid fa-arrow-up"></i> Move Up
        </button>
        <button id="am-move-left-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:var(--accent-color);color:white;font-size:18px;cursor:pointer;touch-action:manipulation;">
            <i class="fa-solid fa-arrow-left"></i> Left
        </button>
        <button id="am-move-right-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:var(--accent-color);color:white;font-size:18px;cursor:pointer;touch-action:manipulation;">
            <i class="fa-solid fa-arrow-right"></i> Right
        </button>
        <button id="am-move-down-btn" class="mobile-control-btn" style="padding:15px;border:none;border-radius:8px;background:var(--accent-color);color:white;font-size:18px;cursor:pointer;touch-action:manipulation;grid-column:span 2;">
            <i class="fa-solid fa-arrow-down"></i> Move Down
        </button>
    </div>
</div>
